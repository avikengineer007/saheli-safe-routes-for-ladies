name: Build SAHELI Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Standalone Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          cd mobile
          npm ci

      - name: Build Production Web Bundle
        run: |
          cd mobile
          npm run build

      - name: Sync Capacitor Android
        run: |
          cd mobile
          npx cap sync android

      - name: Build Android APK (Debug / Standalone Installer)
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAHELI-PanIndia-Safety-App-v1.0.apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
